name: CI

on:
  pull_request:
  push:
    branches: [main, feature-login]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: sqlite:///./ci.db
      ENVIRONMENT: test
      SECRET_KEY: ci-only-secret-key-not-used-in-production
      ACADEMIC_AUTOMATIONS_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall -q main.py worker.py wingo migrations

      - name: Migrate clean database
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Verify migration head
        run: python -m alembic current | grep -q "(head)"
