name: CI

on:
  pull_request:
  push:
    branches: [main, feature-login]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: sqlite:///./ci.db
      ENVIRONMENT: test
      SECRET_KEY: ci-only-secret-key-not-used-in-production
      ACADEMIC_AUTOMATIONS_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.8"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall -q main.py worker.py wingo migrations

      - name: Migrate clean database
        run: python -m alembic upgrade head

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee test-output.log

      - name: Publish test failure details
        if: failure() && steps.tests.outcome == 'failure'
        shell: bash
        run: |
          details="$(tail -n 80 test-output.log)"
          details="${details//'%'/'%25'}"
          details="${details//$'\n'/'%0A'}"
          details="${details//$'\r'/'%0D'}"
          echo "::error title=Unit test failure::$details"
          {
            echo "### Unit test failure"
            echo '```text'
            tail -n 120 test-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify migration head
        run: python -m alembic current | grep -q "(head)"
